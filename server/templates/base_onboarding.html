<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Polly Connect{% endblock %}</title>
    <meta name="csrf-token" content="{{ csrf_token(request) }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <script>
    var CSRF_TOKEN = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
    document.cookie = "csrf_token=" + CSRF_TOKEN + ";path=/;SameSite=Lax";
    </script>
    <!-- Minimal header -->
    <div class="bg-emerald-700 text-white px-4 py-3 text-center">
        <span class="text-2xl">&#x1F99C;</span>
        <span class="font-bold text-lg ml-1">Polly Connect</span>
    </div>

    <!-- Progress dots -->
    {% if step %}
    <div class="flex justify-center gap-2 py-4">
        {% for i in range(1, 6) %}
        <div class="w-3 h-3 rounded-full {% if i < step %}bg-emerald-500{% elif i == step %}bg-emerald-600 ring-2 ring-emerald-300{% else %}bg-gray-300{% endif %}"></div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="max-w-md mx-auto px-4 pb-8">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
