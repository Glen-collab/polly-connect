{% extends "base.html" %}
{% block title %}Family Access - Polly Connect{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold text-emerald-700 mb-2 text-center">Family Access</h1>
        <p class="text-sm text-gray-500 text-center mb-6">Enter the code shared by your family's caretaker</p>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/web/family" class="space-y-4">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
                <input type="text" name="name" id="name" required
                       value="{{ name or '' }}"
                       class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
                       placeholder="e.g. Sarah">
            </div>
            <div>
                <label for="code" class="block text-sm font-medium text-gray-700 mb-1">Access Code</label>
                <input type="text" name="code" id="code" required
                       value="{{ code or '' }}"
                       inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
                       class="w-full border rounded-lg px-4 py-3 text-center text-2xl tracking-widest font-mono focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
                       placeholder="000000">
            </div>
            <button type="submit"
                    class="w-full bg-emerald-600 text-white py-2 px-4 rounded-lg hover:bg-emerald-700 font-medium">
                Enter as Family
            </button>
        </form>

        <p class="mt-4 text-center text-sm text-gray-500">
            Caretaker?
            <a href="/web/login" class="text-emerald-600 hover:underline font-medium">Sign in with email</a>
        </p>
    </div>
</div>
{% endblock %}
