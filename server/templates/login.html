{% extends "base.html" %}
{% block title %}Login - Polly Connect{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="bg-white rounded-lg shadow-md p-6">
        <img src="/static/polly_logo.png" alt="Polly Connect" class="w-28 h-28 mx-auto mb-4">
        <h1 class="text-2xl font-bold text-emerald-700 mb-6 text-center">Welcome to Polly Connect</h1>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/web/login" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" id="email" required
                       value="{{ email or '' }}"
                       class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
                       placeholder="you@example.com">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" id="password" required
                       class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
                       placeholder="Your password">
            </div>
            <button type="submit"
                    class="w-full bg-emerald-600 text-white py-2 px-4 rounded-lg hover:bg-emerald-700 font-medium">
                Sign In
            </button>
        </form>

        <p class="mt-4 text-center text-sm text-gray-500">
            Don't have an account?
            <a href="/web/register" class="text-emerald-600 hover:underline font-medium">Create one</a>
        </p>
        <p class="mt-2 text-center text-sm text-gray-500">
            Family member?
            <a href="/web/family" class="text-emerald-600 hover:underline font-medium">Enter access code</a>
        </p>
    </div>
</div>
{% endblock %}
