{% extends "base.html" %}
{% block title %}Forgot Password - Polly Connect{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold text-emerald-700 mb-2 text-center">Reset Password</h1>
        <p class="text-sm text-gray-500 text-center mb-6">Enter your email and we'll send you a reset link.</p>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4 text-sm">
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="bg-emerald-50 border border-emerald-200 text-emerald-700 px-4 py-3 rounded mb-4 text-sm">
            {{ success }}
        </div>
        {% endif %}

        <form method="POST" action="/web/forgot-password" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" id="email" required
                       value="{{ email or '' }}"
                       class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
                       placeholder="you@example.com">
            </div>
            <button type="submit"
                    class="w-full bg-emerald-600 text-white py-2 px-4 rounded-lg hover:bg-emerald-700 font-medium">
                Send Reset Link
            </button>
        </form>

        <p class="mt-4 text-center text-sm text-gray-500">
            <a href="/web/login" class="text-emerald-600 hover:underline font-medium">Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
