{% extends "base.html" %}
{% block title %}Set New Password - Polly Connect{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold text-emerald-700 mb-2 text-center">Set New Password</h1>
        <p class="text-sm text-gray-500 text-center mb-6">Enter a new password for {{ email }}.</p>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/web/reset-password" class="space-y-4">
            <input type="hidden" name="token" value="{{ token }}">
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                <input type="password" name="password" id="password" required minlength="10"
                       class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
                       placeholder="At least 10 characters">
            </div>
            <div>
                <label for="password_confirm" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <input type="password" name="password_confirm" id="password_confirm" required minlength="10"
                       class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
                       placeholder="Confirm new password">
            </div>
            <button type="submit"
                    class="w-full bg-emerald-600 text-white py-2 px-4 rounded-lg hover:bg-emerald-700 font-medium">
                Update Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
