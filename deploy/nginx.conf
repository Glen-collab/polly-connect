# Polly Connect Nginx Configuration
# Reverse proxy with SSL termination + WebSocket support
#
# Setup:
#   1. Install: sudo dnf install nginx
#   2. Install certbot: sudo dnf install certbot python3-certbot-nginx
#   3. Copy this: sudo cp deploy/nginx.conf /etc/nginx/conf.d/polly-connect.conf
#   4. Get cert: sudo certbot --nginx -d your-domain.duckdns.org
#   5. Reload: sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.duckdns.org;

    # Let's Encrypt will add SSL config here via certbot
    # For now, redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.duckdns.org;

    # SSL certs (managed by certbot)
    # ssl_certificate /etc/letsencrypt/live/your-domain.duckdns.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.duckdns.org/privkey.pem;

    # Proxy to FastAPI
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoints — long timeout for continuous streaming
    location /api/audio/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for continuous audio streaming
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
